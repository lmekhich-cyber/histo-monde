<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Histoire du Monde</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --gold-dark: #8b6914;
    --ink: #0e0b07;
    --parchment: #f5edd6;
    --parchment-dark: #e8d9b5;
    --blood: #8b1a1a;
    --stone: #2a2318;
    --smoke: #6b5f45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    font-family: 'EB Garamond', serif;
    color: var(--parchment);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* STARFIELD */
  #stars {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
    background: radial-gradient(ellipse at center, #1a1208 0%, #0a0703 100%);
  }
  .star {
    position: absolute; border-radius: 50%;
    background: #fff; animation: twinkle var(--d, 3s) infinite var(--delay, 0s);
  }
  @keyframes twinkle {
    0%, 100% { opacity: var(--min-op, 0.2); }
    50% { opacity: var(--max-op, 0.9); }
  }

  /* HEADER */
  header {
    position: relative; z-index: 10; text-align: center;
    padding: 60px 20px 40px;
    background: linear-gradient(180deg, rgba(10,7,3,0.95) 0%, transparent 100%);
  }
  .header-ornament {
    font-size: 1.2rem; color: var(--gold); letter-spacing: 0.5em;
    margin-bottom: 16px; opacity: 0.7;
  }
  h1 {
    font-family: 'Cinzel', serif; font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 900; letter-spacing: 0.1em;
    background: linear-gradient(135deg, var(--gold-dark), var(--gold-light), var(--gold));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; text-shadow: none;
    animation: fadeDown 1.2s ease both;
  }
  .subtitle {
    font-size: 1.1rem; color: var(--smoke); font-style: italic;
    margin-top: 10px; animation: fadeDown 1.4s ease both;
    letter-spacing: 0.1em;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* DIVIDER */
  .divider {
    display: flex; align-items: center; gap: 16px;
    max-width: 600px; margin: 20px auto;
    animation: fadeIn 2s ease both;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, var(--gold-dark), transparent); }
  .divider-diamond {
    width: 8px; height: 8px; background: var(--gold);
    transform: rotate(45deg); flex-shrink: 0;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* TIMELINE NAV */
  .timeline-nav {
    position: relative; z-index: 10;
    display: flex; overflow-x: auto; gap: 0;
    padding: 0 40px; margin: 20px 0;
    scrollbar-width: none;
  }
  .timeline-nav::-webkit-scrollbar { display: none; }

  .era-btn {
    flex-shrink: 0; padding: 12px 20px;
    background: transparent; border: none; cursor: pointer;
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--smoke); transition: all 0.3s ease;
    position: relative; white-space: nowrap;
  }
  .era-btn::after {
    content: ''; position: absolute; bottom: 0; left: 50%; right: 50%;
    height: 2px; background: var(--gold);
    transition: all 0.3s ease;
  }
  .era-btn:hover { color: var(--gold-light); }
  .era-btn.active {
    color: var(--gold);
  }
  .era-btn.active::after { left: 0; right: 0; }

  /* MAIN CONTENT */
  .content {
    position: relative; z-index: 10;
    max-width: 1200px; margin: 0 auto;
    padding: 20px 40px 80px;
  }

  /* ERA PANEL */
  .era-panel {
    display: none; animation: panelIn 0.6s ease both;
  }
  .era-panel.active { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
  @keyframes panelIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ERA HEADER */
  .era-header {
    grid-column: 1 / -1;
    display: flex; align-items: flex-end; gap: 30px;
    padding-bottom: 30px; border-bottom: 1px solid rgba(201,168,76,0.2);
    margin-bottom: 10px;
  }
  .era-icon {
    font-size: 5rem; line-height: 1;
    filter: drop-shadow(0 0 20px rgba(201,168,76,0.4));
    animation: iconFloat 4s ease-in-out infinite;
  }
  @keyframes iconFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .era-title-block {}
  .era-period {
    font-size: 0.8rem; color: var(--gold); letter-spacing: 0.3em;
    text-transform: uppercase; font-family: 'Cinzel', serif;
  }
  .era-title {
    font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 4vw, 3rem);
    font-weight: 900; color: var(--parchment);
    line-height: 1.1; margin: 6px 0;
  }
  .era-tagline { font-style: italic; color: var(--smoke); font-size: 1.05rem; }

  /* CARDS */
  .card {
    background: linear-gradient(135deg, rgba(42,35,24,0.8) 0%, rgba(20,16,10,0.9) 100%);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 2px; padding: 28px;
    position: relative; overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 3px; height: 100%;
    background: linear-gradient(180deg, var(--gold), transparent);
    opacity: 0; transition: opacity 0.3s;
  }
  .card:hover { border-color: rgba(201,168,76,0.4); transform: translateY(-2px); }
  .card:hover::before { opacity: 1; }

  .card-title {
    font-family: 'Cinzel', serif; font-size: 0.75rem;
    letter-spacing: 0.25em; text-transform: uppercase;
    color: var(--gold); margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .card-title::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
  }
  .card-text {
    font-size: 1rem; line-height: 1.8; color: var(--parchment);
    opacity: 0.9;
  }

  /* EVENTS LIST */
  .events-list { list-style: none; }
  .event-item {
    display: flex; gap: 16px; padding: 14px 0;
    border-bottom: 1px solid rgba(201,168,76,0.08);
    transition: background 0.2s;
  }
  .event-item:last-child { border-bottom: none; }
  .event-date {
    font-family: 'Cinzel', serif; font-size: 0.75rem;
    color: var(--gold-dark); min-width: 100px;
    padding-top: 2px; text-align: right;
  }
  .event-dot {
    width: 6px; height: 6px; background: var(--gold);
    border-radius: 50%; flex-shrink: 0; margin-top: 7px;
    box-shadow: 0 0 6px var(--gold);
  }
  .event-desc { font-size: 0.92rem; line-height: 1.6; color: var(--parchment); opacity: 0.85; }

  /* FIGURES */
  .figures-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
  .figure-card {
    background: rgba(201,168,76,0.05);
    border: 1px solid rgba(201,168,76,0.1);
    padding: 14px; border-radius: 1px;
    transition: all 0.3s; cursor: pointer;
    position: relative; overflow: hidden;
  }
  .figure-card::after {
    content: '↗'; position: absolute; top: 10px; right: 12px;
    font-size: 0.75rem; color: var(--gold-dark);
    opacity: 0; transition: opacity 0.3s;
  }
  .figure-card:hover { background: rgba(201,168,76,0.15); border-color: rgba(201,168,76,0.4); transform: translateY(-2px); }
  .figure-card:hover::after { opacity: 1; }
  .figure-name {
    font-family: 'Cinzel', serif; font-size: 0.78rem;
    color: var(--gold-light); margin-bottom: 4px;
  }
  .figure-role { font-size: 0.82rem; color: var(--smoke); font-style: italic; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 1000;
    background: rgba(5,3,1,0.92);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; opacity: 0; pointer-events: none;
    transition: opacity 0.4s ease;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: linear-gradient(135deg, #1a1408 0%, #0e0b07 100%);
    border: 1px solid rgba(201,168,76,0.3);
    max-width: 640px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    position: relative;
    transform: translateY(30px) scale(0.97);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    scrollbar-width: thin; scrollbar-color: var(--gold-dark) transparent;
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-img-wrap {
    width: 100%; height: 260px; overflow: hidden;
    position: relative;
  }
  .modal-img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
    filter: sepia(30%) contrast(1.1);
    transition: transform 0.6s ease;
  }
  .modal-img-wrap:hover .modal-img { transform: scale(1.04); }
  .modal-img-gradient {
    position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(transparent, #0e0b07);
  }
  .modal-img-placeholder {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #1a1408, #2a1e0e);
    font-size: 5rem;
  }

  .modal-body { padding: 28px 32px 32px; }

  .modal-period {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    color: var(--gold-dark); letter-spacing: 0.3em;
    text-transform: uppercase; margin-bottom: 8px;
  }
  .modal-name {
    font-family: 'Cinzel', serif; font-size: 1.8rem;
    font-weight: 900; color: var(--parchment);
    line-height: 1.1; margin-bottom: 6px;
  }
  .modal-role {
    font-style: italic; color: var(--smoke);
    font-size: 1rem; margin-bottom: 24px;
  }

  .modal-divider {
    height: 1px; background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    margin: 20px 0;
  }

  .modal-bio {
    font-size: 0.97rem; line-height: 1.85;
    color: var(--parchment); opacity: 0.88;
    margin-bottom: 24px;
  }

  .modal-quote-block {
    border-left: 2px solid var(--gold-dark);
    padding: 14px 20px;
    background: rgba(201,168,76,0.04);
    margin-bottom: 24px;
  }
  .modal-quote-text {
    font-style: italic; font-size: 1.05rem;
    color: var(--gold-light); line-height: 1.7;
    margin-bottom: 8px;
  }
  .modal-quote-attr {
    font-family: 'Cinzel', serif; font-size: 0.65rem;
    color: var(--gold-dark); letter-spacing: 0.2em;
  }

  .modal-facts { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 24px; }
  .modal-fact {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 8px 14px; font-size: 0.8rem;
    color: var(--parchment); opacity: 0.8;
  }
  .modal-fact strong {
    font-family: 'Cinzel', serif; color: var(--gold);
    font-size: 0.7rem; display: block; margin-bottom: 2px;
    letter-spacing: 0.1em;
  }

  .modal-close {
    position: absolute; top: 14px; right: 16px; z-index: 10;
    background: rgba(10,7,3,0.8); border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold); cursor: pointer; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; transition: all 0.2s;
    font-family: 'Cinzel', serif;
  }
  .modal-close:hover { background: rgba(201,168,76,0.15); }

  .modal-wiki-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    letter-spacing: 0.15em; color: var(--gold-dark);
    text-decoration: none; border-bottom: 1px solid rgba(201,168,76,0.2);
    padding-bottom: 2px; transition: color 0.2s, border-color 0.2s;
  }
  .modal-wiki-link:hover { color: var(--gold); border-color: var(--gold); }

  /* STAT BAR */
  .stat { margin-bottom: 16px; }
  .stat-label {
    display: flex; justify-content: space-between;
    font-size: 0.82rem; margin-bottom: 6px;
    color: var(--smoke);
  }
  .stat-label span:last-child { color: var(--gold); font-family: 'Cinzel', serif; }
  .stat-bar { height: 3px; background: rgba(255,255,255,0.05); border-radius: 2px; overflow: hidden; }
  .stat-fill {
    height: 100%; border-radius: 2px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    width: 0; transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
  }

  /* QUOTE */
  .era-quote {
    grid-column: 1 / -1;
    text-align: center; padding: 30px;
    border-top: 1px solid rgba(201,168,76,0.1);
    margin-top: 10px;
  }
  .quote-text {
    font-size: 1.15rem; font-style: italic;
    color: var(--parchment); opacity: 0.7;
    max-width: 600px; margin: 0 auto;
    line-height: 1.8;
  }
  .quote-source {
    font-family: 'Cinzel', serif; font-size: 0.7rem;
    color: var(--gold-dark); letter-spacing: 0.2em;
    margin-top: 12px;
  }

  /* PROGRESS BAR */
  .era-progress {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    height: 3px; background: rgba(255,255,255,0.05);
  }
  .era-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold-light));
    transition: width 0.5s ease;
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: var(--ink); }
  ::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

  @media (max-width: 768px) {
    .era-panel.active { grid-template-columns: 1fr; }
    .content { padding: 20px; }
    .era-header { flex-direction: column; align-items: flex-start; gap: 10px; }
    .figures-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="stars"></div>

<header>
  <div class="header-ornament">✦ ✦ ✦</div>
  <h1>HISTORIA MUNDI</h1>
  <p class="subtitle">L'histoire du monde à travers les âges</p>
  <div class="divider">
    <div class="divider-line"></div>
    <div class="divider-diamond"></div>
    <div class="divider-line"></div>
  </div>
</header>

<nav class="timeline-nav" id="timelineNav"></nav>

<main class="content" id="content"></main>

<div class="era-progress"><div class="era-progress-fill" id="progressFill"></div></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-img-wrap" id="modalImgWrap"></div>
    <div class="modal-body">
      <div class="modal-period" id="modalPeriod"></div>
      <div class="modal-name" id="modalName"></div>
      <div class="modal-role" id="modalRole"></div>
      <div class="modal-facts" id="modalFacts"></div>
      <div class="modal-divider"></div>
      <div class="modal-bio" id="modalBio"></div>
      <div class="modal-quote-block" id="modalQuoteBlock">
        <div class="modal-quote-text" id="modalQuoteText"></div>
        <div class="modal-quote-attr" id="modalQuoteAttr"></div>
      </div>
      <a class="modal-wiki-link" id="modalWikiLink" target="_blank">↗ LIRE SUR WIKIPÉDIA</a>
    </div>
  </div>
</div>

// STARS
function createStars() {
  const container = document.getElementById('stars');
  for (let i = 0; i < 120; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 2 + 0.5;
    s.style.cssText = `
      left: ${Math.random()*100}%; top: ${Math.random()*100}%;
      width: ${size}px; height: ${size}px;
      --d: ${2+Math.random()*4}s;
      --delay: ${Math.random()*5}s;
      --min-op: ${0.05+Math.random()*0.15};
      --max-op: ${0.4+Math.random()*0.5};
    `;
    container.appendChild(s);
  }
}

// RENDER NAV
function renderNav() {
  const nav = document.getElementById('timelineNav');
  ERAS.forEach((era, i) => {
    const btn = document.createElement('button');
    btn.className = 'era-btn' + (i === 0 ? ' active' : '');
    btn.innerHTML = `${era.icon} ${era.title}`;
    btn.onclick = () => selectEra(i);
    nav.appendChild(btn);
  });
}

// RENDER CONTENT
function renderEra(era, index) {
  return `
    <div class="era-panel${index === 0 ? ' active' : ''}" id="panel-${era.id}" data-index="${index}">
      <div class="era-header">
        <div class="era-icon">${era.icon}</div>
        <div class="era-title-block">
          <div class="era-period">${era.period}</div>
          <h2 class="era-title">${era.title}</h2>
          <p class="era-tagline">${era.tagline}</p>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Vue d'ensemble</div>
        <p class="card-text">${era.description}</p>
      </div>

      <div class="card">
        <div class="card-title">Indicateurs clés</div>
        ${era.stats.map(s => `
          <div class="stat">
            <div class="stat-label"><span>${s.label}</span><span>${s.value}%</span></div>
            <div class="stat-bar"><div class="stat-fill" data-value="${s.value}" style="width:0%"></div></div>
          </div>
        `).join('')}
      </div>

      <div class="card">
        <div class="card-title">Chronologie</div>
        <ul class="events-list">
          ${era.events.map(e => `
            <li class="event-item">
              <span class="event-date">${e.date}</span>
              <span class="event-dot"></span>
              <span class="event-desc">${e.desc}</span>
            </li>
          `).join('')}
        </ul>
      </div>

      <div class="card">
        <div class="card-title">Figures marquantes</div>
        <div class="figures-grid">
          ${era.figures.map(f => `
            <div class="figure-card" onclick="openFigure(${JSON.stringify(f).replace(/"/g, '&quot;')})">
              <div class="figure-name">${f.name}</div>
              <div class="figure-role">${f.role}</div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="era-quote">
        <div class="quote-text">"${era.quote.text}"</div>
        <div class="quote-source">— ${era.quote.source}</div>
      </div>
    </div>
  `;
}

function renderAll() {
  const content = document.getElementById('content');
  content.innerHTML = ERAS.map(renderEra).join('');
}

let currentIndex = 0;

function selectEra(index) {
  // Update nav
  document.querySelectorAll('.era-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === index);
  });

  // Hide current, show new
  document.querySelectorAll('.era-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById(`panel-${ERAS[index].id}`);
  panel.classList.add('active');

  // Animate stat bars
  setTimeout(() => {
    panel.querySelectorAll('.stat-fill').forEach(fill => {
      fill.style.width = fill.dataset.value + '%';
    });
  }, 100);

  // Progress bar
  const progress = ((index + 1) / ERAS.length) * 100;
  document.getElementById('progressFill').style.width = progress + '%';

  currentIndex = index;

  // Scroll nav button into view
  document.querySelectorAll('.era-btn')[index].scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// KEYBOARD NAV
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowRight' && currentIndex < ERAS.length - 1) selectEra(currentIndex + 1);
  if (e.key === 'ArrowLeft' && currentIndex > 0) selectEra(currentIndex - 1);
  if (e.key === 'Escape') closeModalDirect();
});

// MODAL
function openFigure(f) {
  // Image
  const wrap = document.getElementById('modalImgWrap');
  if (f.img) {
    wrap.innerHTML = `<img class="modal-img" src="${f.img}" alt="${f.name}" onerror="this.parentNode.innerHTML='<div class=modal-img-placeholder>${f.emoji || '👤'}</div>'"><div class="modal-img-gradient"></div>`;
  } else {
    wrap.innerHTML = `<div class="modal-img-placeholder">${f.emoji || '👤'}</div>`;
  }

  document.getElementById('modalPeriod').textContent = f.period || '';
  document.getElementById('modalName').textContent = f.name;
  document.getElementById('modalRole').textContent = f.role;
  document.getElementById('modalBio').textContent = f.bio || '';

  // Facts
  const factsEl = document.getElementById('modalFacts');
  factsEl.innerHTML = (f.facts || []).map(fact => `
    <div class="modal-fact"><strong>${fact.k}</strong>${fact.v}</div>
  `).join('');

  // Quote
  if (f.quote) {
    document.getElementById('modalQuoteText').textContent = `"${f.quote.text}"`;
    document.getElementById('modalQuoteAttr').textContent = `— ${f.quote.attr}`;
    document.getElementById('modalQuoteBlock').style.display = 'block';
  } else {
    document.getElementById('modalQuoteBlock').style.display = 'none';
  }

  // Wiki link
  const wikiLink = document.getElementById('modalWikiLink');
  if (f.wiki) {
    wikiLink.href = f.wiki;
    wikiLink.style.display = 'inline-flex';
  } else {
    wikiLink.style.display = 'none';
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// INIT
createStars();
renderNav();
renderAll();
selectEra(0);
</script>
